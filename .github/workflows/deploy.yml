name: NCP Deploy

# ===============================
# 트리거 조건
# main 브랜치에 push(= PR merge) 시 실행
# ===============================
on:
  push:
    branches:
      - main

# ===============================
# Job 정의
# ===============================
jobs:
  # -------------------------------------------------
  # 1️⃣ Build Job (CI 단계)
  # - Spring Boot 빌드
  # - Docker 이미지 생성 및 Docker Hub push
  # -------------------------------------------------
  build:
    runs-on: ubuntu-latest

    steps:
      # 소스 코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v3

      # JDK 21 세팅
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # GitHub Secrets에 저장된 application.yml 생성
      # (운영 환경 설정 주입)
      - name: Create application.yml
        run: |
          mkdir -p src/main/resources
          cat << 'EOF' > src/main/resources/application.yml
          ${{ secrets.SECRET_YML }}
          EOF

      # Gradle Wrapper 실행 권한 부여
      - name: Grant permission for gradlew
        run: chmod +x ./gradlew

      # 🔹 테스트 제외 빌드
      # (테스트는 PR CI에서만 수행)
      - name: Build (skip test)
        run: ./gradlew clean build -x test

      # Docker 이미지 빌드 및 Docker Hub 푸시
      - name: Docker build & push
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

          docker build -t ${{ secrets.DOCKER_REPO }}:${{ github.sha }} .

          docker push ${{ secrets.DOCKER_REPO }}:${{ github.sha }}

  # -------------------------------------------------
  # 2️⃣ Deploy Job (CD 단계)
  # - NCP 서버 접속
  # - Docker 이미지 pull & 실행
  # -------------------------------------------------
  deploy:
    # build job 성공 시에만 실행
    needs: build
    runs-on: ubuntu-latest

    steps:
      # NCP 서버에 SSH 접속하여 배포 수행
      - name: Deploy to NCP
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.NCP_HOST }}
          username: ${{ secrets.NCP_USERNAME }}
          password: ${{ secrets.NCP_PASSWORD }}
          port: ${{ secrets.NCP_PORT }}

          script: |
            echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login \
              -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

            sudo docker stop spring-app || true
            sudo docker rm spring-app || true

            sudo docker pull ${{ secrets.DOCKER_REPO }}:${{ github.sha }}

            sudo docker run -d \
              --name spring-app \
              -p 8080:8080 \
              -e MYSQL_HOST=${{ secrets.MYSQL_HOST }} \
              -e MYSQL_USER=${{ secrets.MYSQL_USER }} \
              -e MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }} \
              -e MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }} \
              ${{ secrets.DOCKER_REPO }}:${{ github.sha }}

            sudo docker image prune -f
